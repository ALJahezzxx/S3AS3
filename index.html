<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سعاسع</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- خلفية فيديو Google Drive -->
  <div id="video-container" class="video-container">
    <iframe
      id="bg-iframe"
      src="https://drive.google.com/file/d/1gtkfuXZ0kHhpVa94klwlZPKMscqjkoCK/preview"
      frameborder="0"
      allow="autoplay"
      allowfullscreen>
    </iframe>
  </div>

  <div class="green-bar"></div>

  <button class="settings-btn" onclick="openModal()">الاعداد</button>

  <main class="main">
    <h1 class="title">سعاسع</h1>
    <div class="buttons">
      <button class="game-btn" onclick="startGame()">اللعب</button>
      <button class="game-btn" onclick="openDevs()">المطورين</button>
    </div>
  </main>

  <!-- Social links bar -->
  <div class="social-bar">
    <a href="https://twitch.tv/s3eedxx" target="_blank" class="social-link">Twitch</a>
    <a href="https://modrinth.com/modpack/s3exp" target="_blank" class="social-link">Modrith</a>
    <a href="https://youtube.com/@s3eed?si=eMDMgmAiJVW8Q4nG" target="_blank" class="social-link">YouTube</a>
    <a href="https://discord.gg/ybhPx5ekkg" target="_blank" class="social-link">Discord.gg</a>
    <a href="https://www.tiktok.com/@is3eedxx?_r=1&_t=ZS-9564zM7YNSH" target="_blank" class="social-link">tiktok</a>
    <a href="https://www.instagram.com/is3eedxx?igsh=MWg5ZWR1Zm9sMHA4dw==" target="_blank" class="social-link">Instagram</a>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>الإعدادات</h2>
      <p>لا توجد إعدادات متاحة حالياً</p>
      <button class="modal-close" onclick="closeModal()">إغلاق</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
